name: TexMix tests

on:
  push:
    branches: [main]
    paths:
      - '02_TexMix/**'
  pull_request:
    branches: [main]
    paths:
      - '02_TexMix/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-r@v2

      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          working-directory: '02_TexMix/TexMix/tests'

      - name: Run tests
        run: |
          library(testthat) 
          source("02_TexMix/TexMix/tests/testthat.R")
        shell: Rscript {0}
